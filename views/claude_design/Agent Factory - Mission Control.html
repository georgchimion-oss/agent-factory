<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Agent Factory — Mission Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0A1628;--bg2:#0F1D32;--bg3:#162540;
  --ink:#E8ECF2;--ink2:#8899B0;--ink3:#5A6E87;
  --pm:#5B9CF5;--eng:#4CD4A1;--rev:#B88FE8;--ship:#F5A05B;
  --accent:#FF6B4A;--teal:#4AEADB;--green:#39FF14;
  --border:rgba(255,255,255,0.06);
}
html,body{width:100%;height:100dvh;overflow:hidden;background:var(--bg);color:var(--ink);font-family:'Space Grotesk',sans-serif;-webkit-font-smoothing:antialiased}
#root{width:100%;height:100%}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes dotPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:0.5}}
@keyframes scan{0%{top:0;opacity:0.6}50%{opacity:0.3}100%{top:100%;opacity:0}}
@keyframes nodeGlow{0%,100%{box-shadow:0 0 8px var(--c)}50%{box-shadow:0 0 24px var(--c),0 0 48px var(--c)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes progressShine{0%{left:-40%}100%{left:140%}}
@keyframes orbMove{0%{offset-distance:0%}100%{offset-distance:100%}}
@keyframes gentleBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes workPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes celebratePop{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes twinkle{0%,100%{opacity:0.2}50%{opacity:1}}
@keyframes satelliteDrift{0%{transform:translateX(0)}100%{transform:translateX(calc(100vw + 80px))}}
@keyframes shootingStar{0%{transform:translateX(0) translateY(0) rotate(15deg);opacity:0}5%{opacity:1}25%{transform:translateX(60vw) translateY(20vh) rotate(15deg);opacity:0}100%{opacity:0}}
@keyframes radarSweep{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="mission-control.jsx"></script>
<script type="text/babel">
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(window.MissionControlApp));
</script>
</body>
</html>
